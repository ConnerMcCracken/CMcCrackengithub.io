<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT</title>
    <link rel="icon" type="image/x-icon" href="media/images/favicon_io/favicon.ico">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/contactstyles.css">
</head>
<body>
    <!--header with nav-->
    <header>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="about.html">ABOUT</a></li>
                <li><a href="contact.html">CONTACT</a></li>
            </ul>
        </nav>
    </header>

    <!-- Body of html, start of form -->
    <form action="thankyou.html">
        <div id="innerForm">
            <h1 id="heading">Contact Us</h1>
            <label>First Name: </label>
            <input type="text" id="fname">
            <br>
            <label>Last Name: </label>
            <input type="text" id="lname">
            <br>
            <p>Comments: </p>
            <textarea rows="4" cols="50" placeholder="Enter comment here..."></textarea>
            <br>
            <button type="reset">Clear</button>
            <button type="submit">Submit</button>
        </div>
    </form>

    <footer>
        <div id="col1">
            <img src="media/images/instagram.png" 
            alt="Company's Instagram Link" 
            width="100" height="100">
            <img src="media/images/tik-tok.png"
            alt="Company's tik-tok Link"
            width="100" height="100">
        </div>
        <div id="col2">
            <h3>Business Hours</h3>
            <p>Monday 8:00AM - 4:00PM</p>
            <p>Wednesday 9:00AM - 2:00PM</p>
            <p>Friday 10:00AM - 12:00PM</p>
            <p>Saturday 9:00AM - 3:00PM</p>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
